server {
    listen 8090;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s;

    # URL shortener proxy (must be before SPA fallback)
    location /s/ {
        set $shortener http://shortener:8082;
        proxy_pass $shortener;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Legacy /go/ shortener proxy
    location /go/ {
        set $shortener http://shortener:8082;
        proxy_pass $shortener;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API proxy
    location /api/ {
        set $backend http://api:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback (last)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
